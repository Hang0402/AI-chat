<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Roleplay AI</title>
<style>
:root { --bg:#f0f2f5; --header:#1a1a2e; --bubble-me:#d4fcd7; --bubble-you:#fff; --accent:#6c5ce7; --text:#1a1a2e; --muted:#8e8e93; --border:#e5e5ea; }
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);height:100vh;display:flex;justify-content:center;align-items:center}
.app{width:100%;max-width:430px;height:100vh;max-height:820px;display:flex;flex-direction:column;background:var(--bg);overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
@media(min-width:500px){.app{border-radius:20px;height:88vh}}

.header{background:var(--header);padding:14px 16px;display:flex;align-items:center;gap:12px;color:#fff}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;position:relative;overflow:hidden}
.online-dot{position:absolute;bottom:2px;right:2px;width:11px;height:11px;border-radius:50%;background:#4cd964;border:2px solid var(--header)}
.header .info{flex:1;min-width:0}
.header .name{font-size:17px;font-weight:600}
.header .status{font-size:12px;opacity:.7;margin-top:1px}
.header .actions{display:flex;gap:4px}
.header .actions button{background:rgba(255,255,255,.12);border:none;color:#fff;font-size:18px;cursor:pointer;padding:8px 10px;border-radius:10px}
.header .actions button:hover{background:rgba(255,255,255,.22)}

.welcome{display:flex;flex-direction:column;align-items:center;padding:40px 20px 20px;text-align:center}
.welcome .big-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#fd79a8,#e84393);margin-bottom:16px;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.welcome h2{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px}
.welcome p{font-size:14px;color:var(--muted);max-width:280px;line-height:1.5}

.messages{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
.message{display:flex;gap:8px;max-width:82%;animation:msgIn .35s cubic-bezier(.2,.8,.2,1.2)}
.message.me{align-self:flex-end;flex-direction:row-reverse}
.message.you{align-self:flex-start}
.msg-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;align-self:flex-end;overflow:hidden;position:relative}
.msg-content{display:flex;flex-direction:column;gap:2px}
.bubble{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.message.me .bubble{background:var(--bubble-me);color:#000;border-bottom-right-radius:6px}
.message.you .bubble{background:var(--bubble-you);color:var(--text);border-bottom-left-radius:6px}
.message .time{font-size:10px;color:var(--muted);padding:0 4px}
.message.me .time{text-align:right}
.typing .bubble{padding:12px 16px;display:flex;gap:4px;align-items:center}
.typing .dot{width:7px;height:7px;border-radius:50%;background:#c0c0c0;animation:bounce 1.4s infinite ease-in-out}
.typing .dot:nth-child(2){animation-delay:.16s}
.typing .dot:nth-child(3){animation-delay:.32s}

.input-area{display:flex;align-items:center;gap:8px;padding:10px 14px 14px;background:#fff;border-top:1px solid var(--border)}
.input-area input{flex:1;padding:11px 16px;border:1.5px solid var(--border);border-radius:22px;font-size:15px;outline:none;background:var(--bg);transition:border-color .2s}
.input-area input:focus{border-color:var(--accent)}
.input-area button{width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;border:none;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(108,92,231,.4);transition:transform .15s}
.input-area button:hover{transform:scale(1.05)}
.input-area button:active{transform:scale(.95)}

.sidebar{position:fixed;top:0;left:0;width:280px;height:100vh;background:#fff;z-index:100;transform:translateX(-100%);transition:transform .3s;box-shadow:2px 0 20px rgba(0,0,0,.1);padding:20px 16px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.sidebar.open{transform:translateX(0)}
.sidebar h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-weight:600}
.char-card{padding:12px 14px;border-radius:14px;cursor:pointer;background:#f8f8fa;border:1.5px solid transparent;transition:all .2s;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.char-card:hover{background:#f0f0f5;border-color:var(--border)}
.char-card.active{background:rgba(108,92,231,.08);border-color:var(--accent)}
.cc-avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;position:relative;overflow:hidden}
.cc-info{flex:1;min-width:0}
.cc-name{font-size:15px;font-weight:600;margin-bottom:2px}
.cc-tags{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.distill-panel{border-top:1px solid var(--border);padding-top:16px}
.distill-panel select,.distill-panel input,.distill-panel textarea{width:100%;font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:10px;margin-bottom:8px;font-family:inherit;background:#f8f8fa}
.distill-panel textarea{height:80px;resize:vertical}
.distill-panel button{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600}
.distill-panel button:hover{opacity:.9}
.distill-panel .result{font-size:11px;color:var(--muted);margin-top:6px;max-height:80px;overflow-y:auto}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:99;display:none}
.overlay.show{display:block}

@keyframes msgIn{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:none}}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
</style>
</head>
<body>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <h3>Characters</h3>
  <div id="charList"></div>
  <div class="distill-panel">
    <h3>Distill New Character</h3>
    <select id="distillType" onchange="toggleDistillUI()"><option value="text">From Text</option><option value="url">From URL</option><option value="search">From Search</option></select>
    <input type="text" id="distillUrl" placeholder="Paste URL..." style="display:none">
    <textarea id="distillContent" placeholder="Paste character description..."></textarea>
    <button onclick="distill()">Distill</button>
    <div class="result" id="distillResult"></div>
  </div>
</div>
<div class="app">
  <div class="header">
    <div class="avatar-wrap"><div class="avatar" id="headerAvatar"><span id="headerEmoji" style="font-size:22px">AI</span></div><div class="online-dot" id="onlineDot" style="display:none"></div></div>
    <div class="info"><div class="name" id="charName">Select a character</div><div class="status" id="charStatus">open menu to start</div></div>
    <div class="actions"><button onclick="toggleSidebar()">&#9776;</button><button onclick="resetChat()">&#8635;</button></div>
  </div>
  <div class="messages" id="messages"><div class="welcome" id="welcomeCard"><div class="big-avatar">&#x1F3AD;</div><h2>Roleplay AI</h2><p>Choose a character from the menu to start chatting</p></div></div>
  <div class="input-area"><input type="text" id="inputBox" placeholder="Type a message..." onkeydown="if(event.key==='Enter')send()"><button onclick="send()">&#10148;</button></div>
</div>
<script>
var ws, currentCharId = null, currentStreamBubble = null, charIdx = 0;
var EMOJIS = ["🐱","🌸","✨","🌿","💗","🌟","🌊","🦋"];

function hashColor(s){var h=0;for(var i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h);return Math.abs(h);}
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function now(){var d=new Date();return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);}
function scrollBottom(){var m=document.getElementById("messages");setTimeout(function(){m.scrollTop=m.scrollHeight},30);}

function makeEmojiAvatar(name,idx){
  var h=hashColor(name||"?"), c1="hsl("+(h%360)+",70%,60%)", c2="hsl("+((h+40)%360)+",70%,50%)";
  return '<div style="position:absolute;inset:0;background:linear-gradient(135deg,'+c1+','+c2+')"></div><span style="position:relative;z-index:1;font-size:18px">'+EMOJIS[idx%EMOJIS.length]+'</span>';
}
function makeAvatar(name,idx,avatarUrl){
  if(avatarUrl) return '<div style="position:absolute;inset:0;border-radius:50%;overflow:hidden;z-index:1"><img src="'+avatarUrl+'" style="width:100%;height:100%;object-fit:cover"></div>';
  return makeEmojiAvatar(name,idx);
}

function updateHeaderUI(name,idx){
  document.getElementById("charName").textContent=name||"Select";
  document.getElementById("charStatus").textContent=name?"online":"open menu to start";
  document.getElementById("onlineDot").style.display=name?"block":"none";
  var avt=currentCharId?(localStorage.getItem("avt_"+currentCharId)||""):"";
  document.getElementById("headerAvatar").innerHTML=makeAvatar(name,idx,avt);
}

function connect(){
  var p=location.protocol==="https:"?"wss:":"ws:";
  ws=new WebSocket(p+"//"+location.host+"/ws/chat");
  ws.onopen=function(){loadCharacters();};
  ws.onmessage=function(e){
    var d=JSON.parse(e.data);
    if(d.type==="chunk"){
      if(!currentStreamBubble){removeTyping();currentStreamBubble=addMessage("you","",true);}
      currentStreamBubble.querySelector(".bubble").textContent+=d.content;scrollBottom();
    }else if(d.type==="done"){currentStreamBubble=null;}
    else if(d.type==="error"){removeTyping();addMessage("you","Error: "+d.message);}
  };
  ws.onclose=function(){document.getElementById("charStatus").textContent="reconnecting...";setTimeout(connect,2000);};
}

function send(){
  var inp=document.getElementById("inputBox"),msg=inp.value.trim();
  if(!msg||!ws||ws.readyState!==1||!currentCharId)return;
  var wc=document.getElementById("welcomeCard");if(wc)wc.style.display="none";
  addMessage("me",msg);inp.value="";addTyping();
  ws.send(JSON.stringify({type:"chat",message:msg}));
}

function addMessage(side,text,streaming){
  var div=document.createElement("div");div.className="message "+side;
  var h="";
  if(side==="you"){
    var avtUrl=currentCharId?(localStorage.getItem("avt_"+currentCharId)||""):"";
    h+='<div class="msg-avatar" style="position:relative">'+makeAvatar(document.getElementById("charName").textContent,charIdx,avtUrl)+'</div>';
  }
  h+='<div class="msg-content"><div class="bubble">'+esc(text)+'</div>';
  if(!streaming)h+='<div class="time">'+now()+'</div>';
  h+='</div>';div.innerHTML=h;
  document.getElementById("messages").appendChild(div);scrollBottom();return div;
}

function addTyping(){
  var div=document.createElement("div");div.className="message you typing typing-indicator";
  var tavt=currentCharId?(localStorage.getItem("avt_"+currentCharId)||""):"";
  div.innerHTML='<div class="msg-avatar" style="position:relative">'+makeAvatar(document.getElementById("charName").textContent,charIdx,tavt)+'</div><div class="msg-content"><div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
  document.getElementById("messages").appendChild(div);scrollBottom();
}
function removeTyping(){var t=document.querySelector(".typing-indicator");if(t)t.remove();}

function toggleSidebar(){document.getElementById("sidebar").classList.toggle("open");document.getElementById("overlay").classList.toggle("show");}
function toggleDistillUI(){var t=document.getElementById("distillType").value;document.getElementById("distillUrl").style.display=t==="url"?"block":"none";}
function resetChat(){if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:"reset"}));document.getElementById("messages").innerHTML='<div class="welcome" id="welcomeCard"><div class="big-avatar">&#x1F3AD;</div><h2>Roleplay AI</h2><p>Choose a character from the menu</p></div>';}

function switchChar(id,idx){
  if(!id)return;charIdx=idx||0;
  var cards=document.querySelectorAll(".char-card");
  for(var i=0;i<cards.length;i++){cards[i].classList.remove("active");if(cards[i].getAttribute("data-id")===id)cards[i].classList.add("active");}
  fetch("/api/character/load/"+encodeURIComponent(id),{method:"POST"})
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data.ok)return;currentCharId=id;
      updateHeaderUI(data.name,idx);
      document.getElementById("messages").innerHTML="";
      addMessage("you",data.greeting);
      toggleSidebar();loadCharacters();
    }).catch(function(e){console.error(e);});
}

function loadCharacters(){
  fetch("/api/characters").then(function(r){return r.json();}).then(function(chars){
    for(var j=0;j<chars.length;j++){chars[j].avatar_url=localStorage.getItem("avt_"+chars[j].id)||"";}
    var html="";
    for(var i=0;i<chars.length;i++){
      var c=chars[i];
      var active=(currentCharId===c.id)?" active":"";
      html+='<div class="char-card'+active+'" data-id="'+esc(c.id)+'" onclick="switchChar(\''+esc(c.id)+'\','+i+')">';
      html+='<div class="cc-avatar" style="position:relative">'+makeAvatar(c.name,i,c.avatar_url)+'</div>';
      html+='<div class="cc-info"><div class="cc-name">'+esc(c.name)+'</div>';
      html+='<div class="cc-tags">'+esc((c.personality||[]).join(" / "))+'</div></div>';
      html+='<div class="cc-upload"><input type="file" accept="image/*" style="display:none" id="file_'+esc(c.id)+'" onchange="uploadAvatar(\''+esc(c.id)+'\',this)"><label for="file_'+esc(c.id)+'" style="cursor:pointer;font-size:10px;color:#6c5ce7">+ Avatar</label></div></div>';
    }
    document.getElementById("charList").innerHTML=html;
  });
}

function uploadAvatar(id,input){
  var file=input.files[0];if(!file)return;
  var form=new FormData();form.append("file",file);
  fetch("/api/character/avatar/"+encodeURIComponent(id),{method:"POST",body:form})
    .then(function(r){return r.json();})
    .then(function(d){if(d.ok){localStorage.setItem("avt_"+id,d.avatar_url);loadCharacters();}});
}

function distill(){
  var type=document.getElementById("distillType").value;
  var content=type==="url"?document.getElementById("distillUrl").value.trim():document.getElementById("distillContent").value.trim();
  if(!content)return;
  var btn=document.querySelector(".distill-panel button");btn.disabled=true;btn.textContent="Distilling...";
  document.getElementById("distillResult").textContent="Working...";
  fetch("/api/character/distill",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({type:type,content:content})})
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.ok){document.getElementById("distillResult").textContent="Created: "+data.card.name;document.getElementById("distillContent").value="";loadCharacters();}
      else{document.getElementById("distillResult").textContent="Error: "+JSON.stringify(data).slice(0,200);}
    }).catch(function(e){document.getElementById("distillResult").textContent="Error: "+e.message;})
    .finally(function(){btn.disabled=false;btn.textContent="Distill";});
}

connect();
</script>
</body>
</html>
